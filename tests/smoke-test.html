<!doctype html><meta charset="utf-8">
<title>Test admin render fix 0.6b</title>
<button id="run">Test</button><div id="out"></div>
<script>
run.onclick=async()=>{
 const p=await fetch('../js/profile-admin.js?v=06badminrenderfix',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Renderer wyposażonych petów',p.includes('function renderAdminEquippedPets(')],
  ['Bezpieczny renderer',p.includes('function safeAdminRender(')],
  ['Bezpieczny zapis formularza',p.includes("safeAdminRender('form'")],
  ['Eksport funkcji',p.includes('window.renderAdminEquippedPets=renderAdminEquippedPets')]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
