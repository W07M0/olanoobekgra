<!doctype html>
<meta charset="utf-8">
<title>Test arena/boss 0.6c</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const s=await fetch('../js/systems.js?v=06carenabossfix',{cache:'no-store'}).then(r=>r.text());
 const c=await fetch('../js/core.js?v=06carenabossfix',{cache:'no-store'}).then(r=>r.text());
 const css=await fetch('../css/styles.css?v=06carenabossfix',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Losowe cząsteczki',s.includes('function spawnSkinEffectParticle')],
  ['Obszar za klikerem',css.includes('.skin-effect-field')],
  ['Postęp bossa per świat',c.includes('state.worldBossProgress[activeWorld.id]')],
  ['Natychmiastowe odświeżenie',s.includes('function refreshBossUnlockUi')],
  ['Brak starego baseline',!s.includes('worldBossStartedAt')]
 ];
 out.innerHTML=checks.map(([name,ok])=>`<p>${ok?'✅':'❌'} ${name}</p>`).join('')
}
</script>
