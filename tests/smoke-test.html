<!doctype html><meta charset="utf-8">
<button id=r>Test</button><div id=o></div><script>
r.onclick=async()=>{let c=await fetch('../css/styles.css?v=06cframebordermask').then(x=>x.text());let a=[['Tło wypełnia wpis',c.includes('--row-background-texture,none')],['Ramka ma maskowany środek',c.includes('-webkit-mask-composite:xor')],['Standardowa maska',c.includes('mask-composite:exclude')],['Osobna grubość ramki',c.includes('--frame-thickness:4px')]];o.innerHTML=a.map(x=>`<p>${x[1]?'✅':'❌'} ${x[0]}</p>`).join('')}</script>
