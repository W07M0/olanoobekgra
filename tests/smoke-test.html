<!doctype html><meta charset="utf-8">
<title>Test 0.6c</title><button id="run">Uruchom test</button><div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06c',{cache:'no-store'}).then(r=>r.text());
 const d=await fetch('../js/data.js?v=06c',{cache:'no-store'}).then(r=>r.text());
 const s=await fetch('../js/systems.js?v=06c',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Wersja 0.6c',d.includes("const GAME_VERSION='0.6c'")],
  ['Stałe HP bossów',s.includes('WORLD_BOSS_FIXED_HP')&&!s.includes('bossPowerSnapshot')],
  ['Brak ścieżki bossów',!h.includes('Ścieżka bossów')],
  ['Podział sklepu permanentnego',h.includes('permanentGemShopGrid')&&h.includes('permanentCoinShopGrid')],
  ['Skiny według rzadkości',s.includes('skin-rarity-group')],
  ['Filtry osiągnięć',h.includes('achievementSearch')],
  ['Nagrody specjalne',s.includes('grantAchievementSpecial')],
  ['Centrum kolekcji',h.includes('data-collection-open')]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
