<!doctype html>
<meta charset="utf-8">
<title>Test boss/skin/ring 0.6c</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const s=await fetch('../js/systems.js?v=06cbossskinringfix',{cache:'no-store'}).then(r=>r.text());
 const c=await fetch('../css/styles.css?v=06cbossskinringfix',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['bossTimer istnieje',s.includes('let bossTimer=null')],
  ['Jedna funkcja efektów',s.match(/function applySkinArenaEffects\(skin\)/g)?.length===1],
  ['Większe obrażenia bossom',s.includes('*1.35')],
  ['Łagodniejsze HP',s.includes('750000000')&&s.includes('2000000000')],
  ['Efekty w pierścieniu',s.includes('const radius=34+Math.random()*18')],
  ['Pole efektów widoczne',c.includes('.skin-effect-field.active')&&c.includes('display:block!important')],
  ['Kliker mniejszy',c.includes('width:78%!important')]
 ];
 out.innerHTML=checks.map(([name,ok])=>`<p>${ok?'✅':'❌'} ${name}</p>`).join('')
}
</script>
