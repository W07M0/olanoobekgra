<!doctype html><meta charset="utf-8">
<title>Test final repair 0.6b</title>
<button id="run">Test</button><div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06brepairfinal',{cache:'no-store'}).then(r=>r.text());
 const p=await fetch('../js/profile-admin.js?v=06brepairfinal',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Renderer wyposażonych petów',p.includes('function renderAdminEquippedPets(')],
  ['Bezpieczne renderowanie',p.includes('function safeAdminRender(')],
  ['Automatyczna naprawa skinów',p.includes('function adminRepairSkins')],
  ['Ręczne usunięcie po ID',h.includes('adminRemoveSkinById')],
  ['Eksport renderera',p.includes('window.renderAdminEquippedPets=renderAdminEquippedPets')]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
