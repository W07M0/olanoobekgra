<!doctype html>
<meta charset="utf-8">
<title>Test kart sklepu 0.6b</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06bshopcards',{cache:'no-store'}).then(r=>r.text());
 const s=await fetch('../js/systems.js?v=06bshopcards',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['upgradeCard istnieje',s.includes('function upgradeCard(u)')],
  ['Podstawowe z tablicy upgrades',s.includes('const temporary=upgrades.filter')],
  ['Permanentne z tablicy upgrades',s.includes('const permanent=upgrades.filter')],
  ['Karty są renderowane',s.includes('temporary.map(upgradeCard)')&&s.includes('permanent.map(upgradeCard)')],
  ['Ulepszenia bossów dołączane',s.includes('bossUpgradeCards()')],
  ['Oba kontenery istnieją',h.includes('temporaryShopGrid')&&h.includes('permanentShopGrid')]
 ];
 out.innerHTML=checks.map(([name,ok])=>`<p>${ok?'✅':'❌'} ${name}</p>`).join('')
}
</script>
