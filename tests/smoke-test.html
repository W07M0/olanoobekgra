<!doctype html>
<meta charset="utf-8">
<title>Test case handlers 0.6c</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const s=await fetch('../js/systems.js?v=06ccasehandlersfix',{cache:'no-store'}).then(r=>r.text());
 const a=await fetch('../js/app.js?v=06ccasehandlersfix',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['openGoldCase istnieje',s.includes('function openGoldCase()')],
  ['Uniwersalny dispatcher',s.includes('function safeOpenCase(')],
  ['Eksport do window',s.includes('window.openGoldCase=openGoldCase')],
  ['Bezpieczne akcje',a.includes('function safeAction(')],
  ['Bezpieczny bindClick',a.includes('element.onclick=safeAction(selector,handler)')]
 ];
 out.innerHTML=checks.map(([name,ok])=>`<p>${ok?'✅':'❌'} ${name}</p>`).join('')
}
</script>
