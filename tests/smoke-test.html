<!doctype html>
<meta charset="utf-8">
<title>Test sklepu 0.6b</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06bshopfix',{cache:'no-store'}).then(r=>r.text());
 const s=await fetch('../js/systems.js?v=06bshopfix',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Grid podstawowy istnieje',h.includes('id="temporaryShopGrid"')],
  ['Grid permanentny istnieje',h.includes('id="permanentShopGrid"')],
  ['renderShop używa obu gridów',s.includes("const temporaryGrid=$('#temporaryShopGrid')")&&s.includes("const permanentGrid=$('#permanentShopGrid')")],
  ['Boss upgrady dołączane',s.includes('bossUpgradeCards()')],
  ['Brak zatrzymania renderu',s.includes("console.error('renderShop:'")]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
