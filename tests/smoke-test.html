<!doctype html>
<meta charset="utf-8">
<title>Test collection/boss result 0.6c</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06ccollectionbossresult',{cache:'no-store'}).then(r=>r.text());
 const s=await fetch('../js/systems.js?v=06ccollectionbossresult',{cache:'no-store'}).then(r=>r.text());
 const a=await fetch('../js/app.js?v=06ccollectionbossresult',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Procent kolekcji',s.includes('function collectionProgressData')&&s.includes("progress.percent+'%'")],
  ['Ekran wyniku bossa',h.includes('id="bossResult"')&&s.includes('function showBossResult')],
  ['Nagrody w wyniku',s.includes('boss-result-rewards')],
  ['Pasek bossa znika',s.includes("bossPanel.classList.add('hidden')")],
  ['Przycisk zamknięcia',a.includes('bossResultContinue')]
 ];
 out.innerHTML=checks.map(([name,ok])=>`<p>${ok?'✅':'❌'} ${name}</p>`).join('')
}
</script>
