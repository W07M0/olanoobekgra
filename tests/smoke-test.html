<!doctype html><meta charset="utf-8">
<title>Test boss/stats 0.6b</title>
<button id="run">Test</button><div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06bbossstats',{cache:'no-store'}).then(r=>r.text());
 const s=await fetch('../js/systems.js?v=06bbossstats',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Ulepszenie obrażeń widoczne',h.includes('bossDamageUpgradeBtn')],
  ['Ulepszenie blokad widoczne',h.includes('bossBlockerUpgradeBtn')],
  ['Pełne statystyki w Ustawieniach',h.includes('settingsStatCasino')&&h.includes('settingsStatPetBonus')],
  ['Renderer statystyk',s.includes('function renderSettingsStatistics()')]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
