<!doctype html><meta charset="utf-8">
<title>Test boss upgrades 0.6b</title>
<button id="run">Test</button><div id="out"></div>
<script>
run.onclick=async()=>{
 const s=await fetch('../js/systems.js?v=06bbosspolish',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Max obrażeń = 10',s.includes('bossDamageUpgradeMax(){return 10}')],
  ['Max blokad = 8',s.includes('bossBlockerUpgradeMax(){return 8}')],
  ['Wysokie ceny',s.includes('125000*Math.pow(2.15')&&s.includes('220000*Math.pow(2.28')],
  ['Przycisk MAX',s.includes("damageMax?'MAX':'Kup ulepszenie'")],
  ['Paski poziomu',s.includes('boss-upgrade-progress')]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
