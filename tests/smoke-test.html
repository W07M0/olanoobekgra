<!doctype html><meta charset="utf-8">
<title>Test pełnego admina 0.6b</title>
<button id="run">Test</button><div id="out"></div>
<script>
run.onclick=async()=>{
 const h=await fetch('../index.html?v=06bfulladmin',{cache:'no-store'}).then(r=>r.text());
 const p=await fetch('../js/profile-admin.js?v=06bfulladmin',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['Edytor JSON',h.includes('adminSaveJson')&&p.includes('validateAdminJson')],
  ['Postęp gracza',h.includes('adminEditXp')&&h.includes('adminEditTotalClicks')],
  ['Kasyno',h.includes('adminEditCasinoChips')],
  ['Światy i skiny',h.includes('adminEditUnlockedWorlds')&&h.includes('adminEditOwnedSkins')],
  ['Minigry',h.includes('adminEditAimRecord')&&h.includes('adminEditDodgeGrade')],
  ['Wszystkie pety',h.includes('adminAllPets')&&p.includes('renderAdminAllPets')],
  ['Pełny zapis',p.includes('adminSaveFromForm')]
 ];
 out.innerHTML=checks.map(([name,ok])=>`<p>${ok?'✅':'❌'} ${name}</p>`).join('')
}
</script>
