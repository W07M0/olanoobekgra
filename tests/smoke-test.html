<!doctype html>
<meta charset="utf-8">
<title>Skin Grid Test</title>
<button id="run">Uruchom test</button>
<div id="out"></div>
<script>
run.onclick=async()=>{
 const systems=await fetch('../js/systems.js?v=06skingrid',{cache:'no-store'}).then(r=>r.text());
 const checks=[
  ['renderSkins istnieje',systems.includes('function renderSkins()')],
  ['Wstawianie kart',systems.includes('grid.innerHTML=ordered.map')],
  ['Przyciski wyposażania',systems.includes('data-skin-id')],
  ['Posiadane skiny',systems.includes("state.ownedSkins.includes")]
 ];
 out.innerHTML=checks.map(([n,v])=>`<p>${v?'✅':'❌'} ${n}</p>`).join('')
}
</script>
